<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>body{margin:0;background:#888;display:flex;flex-direction:column;gap:8px}canvas{display:block;width:100%;height:auto;background:#fff}</style></head>
<body>
<script type="module">
const pdfjs = await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.min.mjs');
pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.worker.min.mjs';
const doc = await pdfjs.getDocument({url: '../uploads/luciana-brand.pdf', cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/cmaps/', cMapPacked: true, standardFontDataUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/standard_fonts/'}).promise;
for (let i = 1; i <= doc.numPages; i++) {
  const page = await doc.getPage(i);
  const vp = page.getViewport({scale: 2});
  const c = document.createElement('canvas');
  c.width = Math.ceil(vp.width); c.height = Math.ceil(vp.height);
  c.id = 'p' + i;
  document.body.appendChild(c);
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, c.width, c.height);
  await page.render({canvasContext: ctx, viewport: vp}).promise;
}
document.title = 'RENDER_DONE';
</script>
</body>
</html>
